name: Deploy (Tailscale)

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy"
        required: true
        default: "main"

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DEPLOY_HOST: 100.76.8.11
  DEPLOY_USER: ubuntu
  DEPLOY_PORT: "22"
  DEPLOY_PATH: /home/ubuntu/apps/portfolio-blog
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    environment: production
    steps:
      - name: Resolve deploy ref
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Tailscale auth mode
        id: ts_auth
        shell: bash
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [[ -n "$TS_OAUTH_CLIENT_ID" && -n "$TS_OAUTH_SECRET" ]]; then
            echo "mode=oauth" >> "$GITHUB_OUTPUT"
          elif [[ -n "$TAILSCALE_AUTHKEY" ]]; then
            echo "mode=authkey" >> "$GITHUB_OUTPUT"
          else
            echo "Neither OAuth secrets nor TAILSCALE_AUTHKEY is configured."
            exit 1
          fi

      - name: Connect to tailnet
        if: ${{ steps.ts_auth.outputs.mode == 'oauth' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Connect to tailnet (auth key fallback)
        if: ${{ steps.ts_auth.outputs.mode == 'authkey' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ env.DEPLOY_PORT }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail

            cd "${{ env.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout "${{ steps.vars.outputs.ref }}"
            git pull origin "${{ steps.vars.outputs.ref }}"

            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            $DC -f "${{ env.COMPOSE_FILE }}" up -d --build
            $DC -f "${{ env.COMPOSE_FILE }}" ps
